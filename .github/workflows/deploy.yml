name: Ammar-Pro-CI-CD-Direct-Deploy

on:
  push:
    branches: [ main ]

jobs:
  sonarcloud-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm test
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    needs: sonarcloud-scan
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_IP }} # Must be a Public IP, NOT the ALB DNS
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Prep Directory
            mkdir -p ~/app && cd ~/app
            
            # 2. Clear old files AND THEN clone (Added the semicolon ;)
            rm -rf *; git clone https://github.com/nmedia-AmmarAhmad/2-tier-devops-project.git .
            
            # 3. Ensure Node/NPM and PM2 are installed (Safety check)
            if ! command -v npm &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y nodejs npm
            fi
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            # 4. Install & Inject Secrets
            npm install
            echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
            echo "DB_USER=admin" >> .env
            echo "DB_PASSWORD=ComplexPass123!" >> .env
            echo "DB_NAME=ammar_db" >> .env
            
            # 5. Start/Restart App
            pm2 restart ammar-app || pm2 start app.js --name "ammar-app"