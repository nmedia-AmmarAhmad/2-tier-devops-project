name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      # 1. THE CI PART: SonarQube Scan
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io" # Assuming you're using SonarCloud

      # 2. THE BUILD PART: Zip the app
      - name: Zip Lambda Function
        run: zip -r function.zip app.js node_modules

      # 3. THE CD PART: Push code to AWS (No Terraform here!)
      - name: Update Lambda Code
        uses: appleboy/lambda-action@master
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: us-east-1 
          function_name: my-javascript-app # MUST match the name in your local Terraform
          zip_file: function.zip