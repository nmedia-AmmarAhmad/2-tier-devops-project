name: Ammar-Pro-CI-CD-Direct-Deploy

on:
  push:
    branches: [ main ]

jobs:
  sonarcloud-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm test
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    needs: sonarcloud-scan
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_IP }} # Must be a Public IP, NOT the ALB DNS
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Force clean the directory
            sudo rm -rf ~/app
            mkdir -p ~/app && cd ~/app
            
            # 2. Clone the code (Now the folder is guaranteed empty)
            git clone https://github.com/nmedia-AmmarAhmad/2-tier-devops-project.git .
            
            # 3. Double check the files are there (This will show in your logs)
            ls -la
            
            # 4. Install & Inject Secrets
            npm install
            echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
            echo "DB_USER=admin" >> .env
            echo "DB_PASSWORD=ComplexPass123!" >> .env
            echo "DB_NAME=ammar_db" >> .env
            
            # 5. Start/Restart App
            # We use 'delete' then 'start' to ensure a fresh process
            pm2 delete ammar-app || true
            pm2 start app.js --name "ammar-app"