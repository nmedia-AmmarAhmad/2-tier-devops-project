name: Ammar-Pro-CI-CD-Direct-Deploy

on:
  push:
    branches: [ main ]

jobs:
  sonarcloud-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm test
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    needs: sonarcloud-scan
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_IP }} # Must be a Public IP, NOT the ALB DNS
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Force clean the directory
            sudo rm -rf ~/app
            mkdir -p ~/app && cd ~/app
            
            # 2. Clone the code
            git clone https://github.com/nmedia-AmmarAhmad/2-tier-devops-project.git .
            
            # 3. AUTO-FIX: Inject dotenv config into app.js
            # This ensures the app actually reads the .env file we create below
            sed -i "1i require('dotenv').config();" app.js
            
            # 4. Install & Inject Secrets
            # We explicitly install dotenv and mysql2 to be safe
            npm install dotenv mysql2
            npm install
            
            echo "DB_HOST=${{ secrets.DB_HOST }}" > .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            
            # 5. Start/Restart App
            # 'delete' ensures PM2 clears out the old 127.0.0.1 memory
            pm2 delete ammar-app || true
            pm2 start app.js --name "ammar-app"